[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.30" # pin the build compiler (reproducible CI); pragma stays ^0.8.20 for integrators
evm_version = "paris"
optimizer = true
optimizer_runs = 200

